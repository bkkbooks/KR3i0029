body:
  text: 洛陽牡丹記宋歐陽修撰花品叙第一牡丹出丹州延州東出青州南亦出越州而出洛陽者今為天下第一洛陽所謂丹州花延州紅青州紅者皆彼土之尤傑者然来洛陽纔得備衆花之一種列第不出三已下不能獨立與洛花敵而越之花以逺罕識不見齒然雖越人亦不敢自譽以與洛陽爭髙下是洛陽者寔天下之第一也洛陽亦有黄芍藥緋桃瑞蓮千葉李紅郁李之類皆不減他出者而洛陽人不甚惜謂之果子花曰某花云云至牡丹則不名直曰花其意謂天下真花獨牡丹其名之著不假曰牡丹而可知也其愛重之如此説者多言洛陽於三河間古善地昔周公以尺寸考日出没測知寒暑風雨乖與順於此此盖天地之中草木之華得中氣之和者多故獨與他方異予甚以為不然夫洛陽於周所有之土四方入貢道里均乃九州之中在天地崑崙旁礴之間未必中也又况天地之和氣宜遍四方上下不宜限其中以自私夫中與和者有常之氣其推於物也亦宜為有常之形物之常者不甚美亦不甚惡及元氣之病也羙惡隔并而不相和入故物有極美與極惡者皆得於氣之偏也花之鍾其美與夫癭木擁腫之鍾其惡醜好雖異而得一氣之偏病則均洛陽城圍數十里而諸縣之花莫及城中者出其境則不可植焉豈又偏氣之美者獨聚此數十里之地乎此又天地之大不可考也已凡物不常有而為害乎人者曰災不常有而徒可怪駭不為害者曰妖語曰天反時為災地反物為妖此亦草木之妖而萬物之一怪也然比夫癭木擁腫者竊獨鍾其美而見幸於人焉余在洛陽四見春天聖九年三月始至洛其至也晩見其晩者明年㑹與友人梅聖俞逰嵩山少室緱氏嶺石唐山紫雲洞既還不及見又明年有悼亡之戚不暇見又明年以留守推官歲滿解去只見其早者是未嘗見其極盛時然目之所矚已不勝其麗焉余居府中時嘗謁錢思公於雙桂樓下見一小屏立坐後細書字滿其上思公指之曰欲作花品此是牡丹名凡九十餘種余時不暇讀之然余所經見而今人多稱者纔三十許種不知思公何從而得之多也計其餘雖有名而不著未必佳也故今所録但取其特著者而次第之姚黄魏花細葉壽安鞓紅亦曰青州紅牛家黄潛溪緋左花獻来紅葉底紫鶴翎紅添色紅倒暈檀心朱砂紅九蘂真珠延州紅多葉紫麤葉壽安丹州紅蓮花蕚一百五鹿胎花甘草黄一㩎紅玊板白花釋名第二牡丹之名或以氏或以州或以地或以色或旌其所異者而志之姚黄左花魏花以姓著青州丹州延州紅以州著細葉麤葉壽安潛溪緋以地著一㩎紅鶴翎紅朱砂紅玉板白多葉紫甘草黄以色著獻来紅添色紅九蘂真珠鹿胎花倒暈檀心蓮花蕚一百五葉底紫皆志其異者姚黄者千葉黄花出於民姚氏家此花之出於今未十年姚氏居白司馬坡其地屬河陽然花不傳河陽傳洛陽洛陽亦不甚多一歳不過數朶牛黄亦千葉出於民牛氏家比姚黄差小真宗祀汾隂還過洛陽留宴淑景亭牛氏獻此花名遂著甘草黄單葉色如甘草洛人善别花見其樹知為某花云獨姚黄易識其葉嚼之不腥魏家花者千葉肉紅花出於魏相仁浦家始樵者於壽安山中見之斵以賣魏氏魏氏池舘甚大傳者云此花初出時人有欲閱者人稅十數錢乃得登舟渡池至花所魏氏日收十數緡其後破亡鬻其園今普明寺後林池乃其地寺僧耕之以植桑麥花傳民家甚多人有數其葉者云至七百葉錢思公嘗曰人謂牡丹花王今姚黄真可為王而魏花乃后也鞓紅者單葉深紅花出青州亦曰青州紅故張僕射齊賢有第西京賢相坊自青州以馲駞䭾其種遂傳洛中其色類腰𢃄鞓謂之鞓紅獻来紅者大多葉淺紅花張僕射罷相居洛陽人有獻此花者因曰獻来紅添色紅者多葉花始開而白經日漸紅至其落乃類深紅此造化之尤巧者鶴翎紅者多葉花其末白而本肉紅如鴻鵠羽色細葉麤葉壽安者皆千葉肉紅花出壽安縣錦屏山中細葉者尤佳倒暈檀心者多葉紅花凡花近蕚色深至其末漸淺此花自外深色近蕚反淺白而深檀㸃其心此尤可愛一㩎紅者多葉淺紅花葉杪深紅一㸃如人以三指㩎之九蘂真珠紅者千葉紅花葉上有一白㸃如珠而葉密蹙其蘂為九叢一百五者多葉白花洛花以榖雨為開候而此花常至一百五日開最先丹州延州花者皆千葉紅花不知其至洛之因蓮花蕚者多葉紅花青趺三重如蓮花蕚左花者千葉紫花葉密而齊如截亦謂之平頭紫朱砂紅者多葉紅花不知其所出有民門氏子者善接花以為生買地於崇德寺前治花圃有此花洛陽豪家尚未有故其名未甚著花葉甚鮮向日視之如猩血葉底紫者千葉紫花其色如墨亦謂之墨紫花在藂中旁必生一大枝引葉覆其上其開也比他花可延十日之乆噫造物者亦惜之耶此花之出比他花最逺傳云唐末有中官為觀軍容使者花出其家亦謂之軍容紫歳乆失其姓氏矣玉板白者單葉白花葉細長如拍板其色如玊而深檀心洛陽人家亦少有余嘗從思公至福嚴院見之問寺僧而得其名其後未嘗見也潛溪緋者千葉緋花出於潛溪寺寺在龍門山後本唐相李藩别墅今寺中已無此花而人家或有之本是紫花忽於藂中特出緋者不過一二朶明年移在他枝洛人謂之轉音篆枝花故其接頭尤難得鹿胎花者多葉紫花有白㸃如鹿胎之紋故蘓相禹珪宅今有之多葉紫不知其所出初姚黄未出時牛黄為第一牛黄未出時魏花為第一魏花未出時左花為第一左花之前唯有蘓家紅賀家紅林家紅之類皆單葉花當時為第一自多葉千葉花出後此花黜矣今人不復種也牡丹初不載文字唯以藥載本草然於花中不為高第大抵丹延已西及褒斜道中尤多與荆棘無異土人皆取以為薪自唐則天已後洛陽牡丹始盛然未聞有以名著者如沈宋元白之流皆善詠花草計有若今之異者彼必形於篇詠而寂無傳焉唯劉夢得有詠魚朝恩宅牡丹詩但云一藂千萬朶而已亦不云其美且麗也謝靈運言永嘉竹間水際多牡丹今越花不及洛陽甚逺是洛花自古未有若今之盛也風土記第三洛陽之俗大抵好花春時城中無貴賤皆挿花雖負擔者亦然花開時士庶競為逰遨徃徃於古寺廢宅有池臺處為市井張幄帟笙歌之聲相聞最盛於月陂堤張家園棠棣坊長壽寺東街與郭令宅至花落乃罷洛陽至東京六驛舊不進花自今徐州李相廸為留守時始進御歳遣牙校一員乘驛馬一日一夕至京師所進不過姚黄魏花三數朶以菜葉實竹籠子藉覆之使馬上不動揺以蠟封花蔕乃數日不落大抵洛人家家有花而少大樹者盖其不接則不佳春初時洛人於壽安山中斵小栽子賣城中謂之山箆子人家治地為畦塍種之至秋乃接接花尤工者一人謂之門園子豪家無不邀之姚黄一接頭直錢五千秋時立劵買之至春見花乃歸其直洛人甚惜此花不欲傳有權貴求其接頭者或以湯中蘸殺與之魏花初出時接頭亦直錢五千今尚直一千接時須用社後重陽前過此不佳也花之本木去地五七寸許截之乃接以泥封裹用軟土擁之以蒻葉作庵子罩之不令見風日唯南向留一小户以達氣至春乃去其覆此接花之法也用瓦亦竒種花必擇善地盡去舊土以細土用白歛末一斤和之盖牡丹根甜多引蟲食白歛能殺蟲此種花之法也澆花亦自有時或用日未出或日西時九月旬日一澆十月十一月三日二日一澆正月隔日一澆二月一日一澆此澆花之法也一本發數朶者擇其小者去之只留一二朶謂之打剥懼分其脉也花纔落便剪其枝勿令結子懼其易老也春初既去蒻庵便以棘數枝置花叢上棘氣暖可以辟霜不損花芽他大樹亦然此養花之法也花開漸小於舊者盖有蠧蟲損之必尋其穴以硫黄簮之其旁又有小穴如鍼孔乃蟲所藏處花工謂之氣牕以大鍼㸃硫黄末鍼之蟲乃死花復盛此醫花之法也烏賊魚骨用以鍼花樹入其膚花輒死此花之忌也洛陽牡丹記
