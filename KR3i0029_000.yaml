body:
  text: 提要洛陽牡丹記譜録類三草木禽魚之屬臣等謹案洛陽牡丹記一卷宋歐陽修撰修有詩本義等書已别著録是記凡三篇一曰花品叙所列凡二十四種二曰花釋名述花名之所自來三曰風俗記首略叙遊宴及貢花餘皆接植栽灌之事文格絶古雅有法蔡襄嘗書而刻之於家以拓本遺修修自為跋其後已編入文忠全集中此其單行之本也周必大作歐集考異稱當時士大夫家有修牡丹譜印本始列花品叙及名品與此卷前兩篇頗同其後則曰叙事宫禁貴家寺觀府署元白詩譏鄙吳蜀詩集記異雜記本朝雙頭花進花丁晉公續花譜凡十六門萬餘言後有梅堯臣跋其妄尤甚蓋出假托云云據此是宋時尚别有一本故宋史藝文志亦以牡丹譜著録而不稱牡丹記自必大考正後其書始廢不行可見坊刻贋本由來固已久矣揚州芍藥譜譜録類三草木禽魚之屬臣等謹案揚州芍藥譜一卷宋王觀撰觀字達叟如皋人熙寧中嘗以將仕郎守大理寺丞知揚州江都縣在任為揚州賦上之大蒙褒賞賜緋衣銀章事蹟見嘉靖維揚志中汪士賢刻入山居雜志題為江都人者誤也揚州芍藥自宋初名於天下與洛陽牡丹俱貴於時宋史藝文志載為之譜者三家其一孔武仲其一劉攽其一即觀此譜而觀譜最後出至今獨存孔劉二家則世已無傳僅陳景沂全芳備祖載有其略今與此譜相校其所謂三十一品前人所定者實即本之於劉譜惟劉譜有妬裙紅一品此譜改作妒鵝黃又略為移易其次序其劉譜所無者新增八種而已又觀後論所稱或者謂唐張祜杜牧盧同之徒居揚日久無一言及芍藥意古未有如今之盛云云亦即孔譜序中語觀蓋取其意而翻駁之至孔譜謂可紀者三十有三種具列其名比劉譜較多二種今嘉靖維揚志尚存原目亦頗有所異同焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
